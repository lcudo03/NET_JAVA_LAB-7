<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (category(); as categoryRef) {
      <div>
        <h2 data-cy="categoryDetailsHeading"><span jhiTranslate="bikeRentalAppApp.category.detail.title">Category</span></h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ categoryRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="bikeRentalAppApp.category.name">Name</span></dt>
          <dd>
            <span>{{ categoryRef.name }}</span>
          </dd>
          <dt><span jhiTranslate="bikeRentalAppApp.category.description">Description</span></dt>
          <dd>
            <span>{{ categoryRef.description }}</span>
          </dd>
          <dt><span jhiTranslate="bikeRentalAppApp.category.bikes">Bikes</span></dt>
          <dd>
            @for (bikes of categoryRef.bikeses; track $index; let last = $last) {
              <span>
                <a [routerLink]="['/bike', bikes.id, 'view']">{{ bikes?.id }}</a
                >{{ last ? '' : ', ' }}
              </span>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/category', categoryRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
